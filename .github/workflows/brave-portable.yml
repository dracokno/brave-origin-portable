name: Brave Portable Auto Builder
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
permissions:
  contents: write
  packages: write
jobs:
  check-and-build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            setdll_exe: 'setdll-x64.exe'
            version_dll: 'version-x64.dll'
          - arch: x86
            setdll_exe: 'setdll-x86.exe'
            version_dll: 'version-x86.dll'
            
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download and Extract Brave from GitHub Releases
      id: brave-version
      shell: powershell
      run: |
        try {
          $headers = @{ 'Authorization' = 'token ${{ secrets.GITHUB_TOKEN }}' }
          Write-Host "Fetching latest Brave Release metadata..." -ForegroundColor Yellow
          $braveRelease = Invoke-RestMethod "https://api.github.com/repos/brave/brave-browser/releases/latest" -Headers $headers
          
          $pattern = if ("${{ matrix.arch }}" -eq "x64") { "^brave-v[0-9.]+-win32-x64\.zip$" } else { "^brave-v[0-9.]+-win32-ia32\.zip$" }
          $braveAsset = $braveRelease.assets | Where-Object { $_.name -match $pattern } | Select-Object -First 1
          
          if ($null -eq $braveAsset) {
            throw "Could not find a valid zip archive asset matching architecture pattern '$pattern' in latest release."
          }
          
          $zipPath = "$env:TEMP\brave_${{ matrix.arch }}.zip"
          Write-Host "Downloading $($braveAsset.name)..." -ForegroundColor Yellow
          Invoke-WebRequest -Uri $braveAsset.browser_download_url -OutFile $zipPath
          
          $extractPath = "$env:GITHUB_WORKSPACE\Brave_Raw_Extract"
          if (Test-Path $extractPath) { Remove-Item $extractPath -Recurse -Force }
          New-Item -ItemType Directory -Path $extractPath -Force | Out-Null
          
          Write-Host "Extracting archive to local workspace..." -ForegroundColor Yellow
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          
          $braveExePath = Get-ChildItem -Path $extractPath -Filter "brave.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if ($null -eq $braveExePath) {
            throw "Extraction completed, but failed to yield a valid brave.exe binary target."
          }
          
          $applicationDir = Split-Path $braveExePath
          $braveVersion = (Get-Item $braveExePath).VersionInfo.ProductVersion
          
          echo "BRAVE_VERSION=$braveVersion" >> $env:GITHUB_OUTPUT
          echo "APP_PATH=$applicationDir" >> $env:GITHUB_OUTPUT
          
          $versionDir = "$applicationDir\$braveVersion"
          $extensionsPath = "$versionDir\default_apps"
          if (Test-Path $extensionsPath) {
            Get-ChildItem $extensionsPath -Directory | Where-Object {
              $_.Name -match "(brave|rewards|wallet|vpn|talk|news|playlist|search|leo|dashboard|sidebar)"
            } | ForEach-Object {
              Remove-Item $_.FullName -Recurse -Force -ErrorAction SilentlyContinue
              Write-Host "Removed extension component: $($_.Name)"
            }
          }
        } catch {
          Write-Error "Failed to fetch or extract portable Brave source: $($_.Exception.Message)"
          exit 1
        }
        
    - name: Get latest Chrome++ version
      id: chromeplus-version
      shell: powershell
      run: |
        try {
          $headers = @{ 'Authorization' = 'token ${{ secrets.GITHUB_TOKEN }}' }
          $chromePlusRelease = Invoke-RestMethod "https://api.github.com/repos/Bush2021/chrome_plus/releases/latest" -Headers $headers
          $chromePlusVersion = $chromePlusRelease.tag_name
          echo "CHROMEPLUS_VERSION=$chromePlusVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Chrome++ version: $chromePlusVersion"
        } catch {
          Write-Error "Failed to get Chrome++ version: $($_.Exception.Message)"
          exit 1
        }
        
    - name: Check if release exists
      id: check-release
      shell: powershell
      run: |
        $releaseTag = "brave-portable-${{ matrix.arch }}_${{ steps.brave-version.outputs.BRAVE_VERSION }}_${{ steps.chromeplus-version.outputs.CHROMEPLUS_VERSION }}"
        echo "RELEASE_TAG=$releaseTag" >> $env:GITHUB_OUTPUT
        
        try {
          $headers = @{
            'Authorization' = 'token ${{ secrets.GITHUB_TOKEN }}'
            'Accept' = 'application/vnd.github.v3+json'
          }
          $response = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$releaseTag" -Headers $headers -ErrorAction Stop
          echo "RELEASE_EXISTS=true" >> $env:GITHUB_OUTPUT
          Write-Host "Release $releaseTag already exists"
        } catch {
          if ($_.Exception.Response.StatusCode -eq 404) {
            echo "RELEASE_EXISTS=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release $releaseTag does not exist, will create new one"
          } else {
            Write-Error "Error checking release: $($_.Exception.Message)"
            exit 1
          }
        }
        
    - name: Build Brave Portable
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      shell: powershell
      run: |
        Write-Host "Building Brave Portable ${{ matrix.arch }} with Chrome++" -ForegroundColor Green
        
        $rootPath = "$env:GITHUB_WORKSPACE\Brave_Portable_${{ matrix.arch }}"
        $portablePath = "$rootPath\Brave"
        $tempDir = "$env:TEMP\BraveBuilder_${{ matrix.arch }}"
        $applicationPath = "${{ steps.brave-version.outputs.APP_PATH }}"
        
        if (Test-Path $tempDir) { Remove-Item $tempDir -Recurse -Force }
        New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
        if (Test-Path $rootPath) { Remove-Item $rootPath -Recurse -Force }
        New-Item -ItemType Directory -Path $rootPath -Force | Out-Null
        
        $headers = @{ 'Authorization' = 'token ${{ secrets.GITHUB_TOKEN }}' }
        $chromePlusRelease = Invoke-RestMethod "https://api.github.com/repos/Bush2021/chrome_plus/releases/latest" -Headers $headers
        $chromePlusDownloadUrl = $chromePlusRelease.assets | Where-Object { $_.name -eq "setdll.7z" } | Select-Object -First 1 -ExpandProperty browser_download_url
        
        Invoke-WebRequest -Uri $chromePlusDownloadUrl -OutFile "$tempDir\setdll.7z"
        Invoke-WebRequest -Uri "https://www.7-zip.org/a/7zr.exe" -OutFile "$tempDir\7zr.exe"
        
        Copy-Item "$env:GITHUB_WORKSPACE\chrome++.ini" "$applicationPath\chrome++.ini" -Force
        Copy-Item "$env:GITHUB_WORKSPACE\update.bat" "$applicationPath\update.bat" -Force
        Copy-Item "$env:GITHUB_WORKSPACE\debloat.reg" "$applicationPath\debloat.reg" -Force
        
        $sevenZPath = "$tempDir\7zr.exe"
        $chromePlusExtractDir = "$tempDir\chromeplus"
        & $sevenZPath x "$tempDir\setdll.7z" "-o$chromePlusExtractDir" -y | Out-Null
        
        Copy-Item "$chromePlusExtractDir\${{ matrix.setdll_exe }}" "$applicationPath\setdll-local.exe" -Force
        Copy-Item "$chromePlusExtractDir\${{ matrix.version_dll }}" "$applicationPath\version.dll" -Force
        
        Push-Location $applicationPath
        & ".\setdll-local.exe" /d:version.dll brave.exe
        if ($LASTEXITCODE -ne 0) {
            Write-Error "setdll failed to binary-patch brave.exe with exit code $LASTEXITCODE."
            Pop-Location
            if (Test-Path "$applicationPath\brave.exe#") { Remove-Item "$applicationPath\brave.exe#" -Force }
            exit 1
        }
        Pop-Location
        
        Copy-Item $applicationPath $portablePath -Recurse -Force
        
        Remove-Item $tempDir -Recurse -Force
        Remove-Item "$portablePath\setdll-local.exe", "$portablePath\brave.exe~" -Force -ErrorAction SilentlyContinue
        
        Write-Host "Build completed!" -ForegroundColor Green
        
    - name: Create ZIP archive
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      id: create-archive
      shell: powershell
      run: |
        $releaseTag = "${{ steps.check-release.outputs.RELEASE_TAG }}"
        $zipPath = "$env:GITHUB_WORKSPACE\$releaseTag.zip"
        $sourcePath = "$env:GITHUB_WORKSPACE\Brave_Portable_${{ matrix.arch }}"
        
        Compress-Archive -Path $sourcePath -DestinationPath $zipPath -CompressionLevel Optimal
        Write-Host "Created archive: $zipPath"
        echo "ARCHIVE_PATH=$zipPath" >> $env:GITHUB_OUTPUT
        
    - name: Create Release and Upload Asset
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $releaseTag = "${{ steps.check-release.outputs.RELEASE_TAG }}"
        $braveVersion = "${{ steps.brave-version.outputs.BRAVE_VERSION }}"
        $chromePlusVersion = "${{ steps.chromeplus-version.outputs.CHROMEPLUS_VERSION }}"
        $archivePath = "${{ steps.create-archive.outputs.ARCHIVE_PATH }}"
        
        $releaseBody = "**Brave Portable with Chrome++ Auto Build**`n`n**Architecture:** ${{ matrix.arch }}`n**Brave Version:** $braveVersion`n**Chrome++ Version:** $chromePlusVersion`n`n## What's Included`n- Brave Browser Portable (${{ matrix.arch }})`n- Chrome++ enhancements`n- Debloated configuration`n`n## Installation`n1. Download the ZIP file`n2. Extract`n3. Run Brave_Portable_${{ matrix.arch }}\Brave\brave.exe`n`n---`n*This release was automatically generated by GitHub Actions*"
        
        Write-Host "Creating release: $releaseTag" -ForegroundColor Yellow
        gh release create $releaseTag --title "$releaseTag" --notes $releaseBody --repo ${{ github.repository }} $archivePath
        Write-Host "Release created successfully!" -ForegroundColor Green
        
    - name: Summary
      shell: powershell
      run: |
        if ("${{ steps.check-release.outputs.RELEASE_EXISTS }}" -eq "true") {
          Write-Host "Release ${{ steps.check-release.outputs.RELEASE_TAG }} already exists - skipped" -ForegroundColor Yellow
        } else {
          Write-Host "Successfully created release ${{ steps.check-release.outputs.RELEASE_TAG }}" -ForegroundColor Green
        }