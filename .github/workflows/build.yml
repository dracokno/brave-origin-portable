name: Brave Portable Auto Builder

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-and-build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            setdll_exe: 'setdll-x64.exe'
            version_dll: 'version-x64.dll'
          - arch: x86
            setdll_exe: 'setdll-x86.exe'
            version_dll: 'version-x86.dll'
            
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get latest Brave version
      id: versions
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        try {
          $braveTag = gh release view --repo brave/brave-browser --json tagName --jq .tagName
          $braveVersion = $braveTag -replace '^v', ''
          if (-not $braveVersion) { throw "Failed to fetch Brave version" }
          echo "BRAVE_VERSION=$braveVersion" >> $env:GITHUB_OUTPUT
        } catch {
          Write-Error $_.Exception.Message
          exit 1
        }
        
    - name: Check if release exists
      id: check-release
      shell: powershell
      run: |
        $releaseTag = "brave-origin-portable-${{ matrix.arch }}_${{ steps.versions.outputs.BRAVE_VERSION }}"
        echo "RELEASE_TAG=$releaseTag" >> $env:GITHUB_OUTPUT
        try {
          $headers = @{
            'Authorization' = 'token ${{ secrets.GITHUB_TOKEN }}'
            'Accept' = 'application/vnd.github.v3+json'
          }
          $response = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$releaseTag" -Headers $headers -ErrorAction Stop
          echo "RELEASE_EXISTS=true" >> $env:GITHUB_OUTPUT
        } catch {
          if ($_.Exception.Response.StatusCode -eq 404) {
            echo "RELEASE_EXISTS=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Error checking release: $($_.Exception.Message)"
            exit 1
          }
        }

    - name: Build Portable
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        function Safe-RemoveItem {
          param ([string[]]$Paths)
          foreach ($path in $Paths) {
            if (Test-Path $path) {
              for ($i = 1; $i -le 10; $i++) {
                try { Remove-Item $path -Force -Recurse -ErrorAction Stop; break }
                catch { Start-Sleep -Milliseconds 500 }
              }
            }
          }
        }

        try {
          $rootPath = "$env:GITHUB_WORKSPACE\Brave_Origin_Portable_${{ matrix.arch }}"
          $portablePath = "$rootPath\Brave"
          $liteExtract = "$env:TEMP\chrome_plus_lite_out"
          $setdllExtract = "$env:TEMP\setdll_out"
          
          if (Test-Path $rootPath) { Remove-Item $rootPath -Recurse -Force }
          New-Item -ItemType Directory -Path $portablePath -Force | Out-Null
          
          $pattern = if ("${{ matrix.arch }}" -eq "x64") { "brave-origin*-win32-x64.zip" } else { "brave-origin*-win32-ia32.zip" }
          
          gh release download --repo brave/brave-browser --pattern $pattern --dir "$env:TEMP"
          gh release download latest --repo callmenet/chrome_plus_lite --pattern "chrome_plus_lite.zip" --dir "$env:TEMP"
          gh release download --repo Bush2021/chrome_plus --pattern "setdll.7z" --dir "$env:TEMP"
          
          $zipFile = Get-ChildItem "$env:TEMP" -Filter $pattern | Select-Object -First 1
          if ($null -eq $zipFile) { throw "Zip file not found" }
          
          & 7z x $zipFile.FullName "-o$portablePath" -y | Out-Null
          & 7z x "$env:TEMP\chrome_plus_lite.zip" "-o$liteExtract" -y | Out-Null
          & 7z x "$env:TEMP\setdll.7z" "-o$setdllExtract" -y | Out-Null
          
          $braveExePath = Get-ChildItem -Path $portablePath -Filter "brave.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if ($null -eq $braveExePath) { throw "brave.exe not found" }
          $applicationPath = Split-Path $braveExePath
          
          if (Test-Path "$env:GITHUB_WORKSPACE\chrome++.ini") {
            Copy-Item "$env:GITHUB_WORKSPACE\chrome++.ini" "$applicationPath\chrome++.ini" -Force
          } else {
            Copy-Item "$liteExtract\chrome++.ini" "$applicationPath\chrome++.ini" -Force
          }
          
          if (Test-Path "$env:GITHUB_WORKSPACE\run_update.bat") { Copy-Item "$env:GITHUB_WORKSPACE\run_update.bat" "$applicationPath\run_update.bat" -Force }
          if (Test-Path "$env:GITHUB_WORKSPACE\update.ps1") { Copy-Item "$env:GITHUB_WORKSPACE\update.ps1" "$applicationPath\update.ps1" -Force }
          
          Copy-Item "$setdllExtract\${{ matrix.setdll_exe }}" "$applicationPath\setdll-local.exe" -Force
          Copy-Item "$liteExtract\${{ matrix.version_dll }}" "$applicationPath\version.dll" -Force
          
          $versionFolder = Get-ChildItem -Path $applicationPath -Directory | Where-Object { $_.Name -match "^\d+\.\d+\.\d+\.\d+$" } | Select-Object -First 1
          if ($null -ne $versionFolder) {
            $extensionsPath = Join-Path $versionFolder.FullName "default_apps"
            if (Test-Path $extensionsPath) {
              Get-ChildItem $extensionsPath -Directory | Where-Object {
                $_.Name -match "(brave|rewards|wallet|vpn|talk|news|playlist|search|leo|dashboard|sidebar)"
              } | ForEach-Object { Remove-Item $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
            }
          }
          
          Push-Location $applicationPath
          $process = Start-Process -FilePath ".\setdll-local.exe" -ArgumentList "/d:version.dll", "brave.exe" -Wait -NoNewWindow -PassThru
          if ($process.ExitCode -ne 0) {
              Write-Error "setdll failed"
              Pop-Location
              Safe-RemoveItem -Paths "$applicationPath\brave.exe#"
              exit 1
          }
          Pop-Location
          
          Safe-RemoveItem -Paths @(
            $liteExtract, $setdllExtract, $zipFile.FullName,
            "$env:TEMP\chrome_plus_lite.zip", "$env:TEMP\setdll.7z",
            "$applicationPath\setdll-local.exe", "$applicationPath\brave.exe~", "$applicationPath\brave.exe#"
          )
        } catch {
          Write-Error $_.Exception.Message
          exit 1
        }
        
    - name: Create ZIP archive
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      id: create-archive
      shell: powershell
      run: |
        $releaseTag = "${{ steps.check-release.outputs.RELEASE_TAG }}"
        $zipPath = "$env:GITHUB_WORKSPACE\$releaseTag.zip"
        Compress-Archive -Path "$env:GITHUB_WORKSPACE\Brave_Origin_Portable_${{ matrix.arch }}" -DestinationPath $zipPath -CompressionLevel Optimal
        echo "ARCHIVE_PATH=$zipPath" >> $env:GITHUB_OUTPUT
        
    - name: Create Release and Upload Asset
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $releaseTag = "${{ steps.check-release.outputs.RELEASE_TAG }}"
        $braveVersion = "${{ steps.versions.outputs.BRAVE_VERSION }}"
        $archivePath = "${{ steps.create-archive.outputs.ARCHIVE_PATH }}"
        $releaseBody = "**Brave Portable with Chrome++ Lite**`n`n- **Architecture:** ${{ matrix.arch }}`n- **Brave Version:** $braveVersion`n- **Chrome++ Lite:** latest"
        gh release create $releaseTag --title "$releaseTag" --notes $releaseBody --repo ${{ github.repository }} $archivePath
        
    - name: Summary
      shell: powershell
      run: |
        Write-Host "Done processing ${{ steps.check-release.outputs.RELEASE_TAG }}"
